name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx eslint src/ api/
      - run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,css,json}" "api/**/*.js"
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      VITE_FIREBASE_API_KEY: dummy
      VITE_FIREBASE_AUTH_DOMAIN: dummy
      VITE_FIREBASE_PROJECT_ID: dummy
      VITE_FIREBASE_STORAGE_BUCKET: dummy
      VITE_FIREBASE_MESSAGING_SENDER_ID: dummy
      VITE_FIREBASE_APP_ID: dummy
      VITE_FIREBASE_DATABASE_URL: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx vite build
